<!DOCTYPE html>
<html>
<head>
  <title>View Questions</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff758c, #2d0374c4);
      text-align: center;
    }

    h2 {
      color: white;
      margin-top: 20px;
    }

    .container {
      width: 80%;
      margin: auto;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      text-align: left;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    .question {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .options {
      margin-left: 10px;
      color: #555;
    }

    button {
      margin-top: 10px;
      padding: 8px 15px;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: darkred;
    }
  </style>
</head>

<body>

<h2>📋 Question List (Admin Panel)</h2>

<div class="container" id="data"></div>

<script>
fetch("http://localhost:3001/questions?topic=Math&difficulty=Easy")
.then(res => res.json())
.then(data => {
  let html = "";

  data.forEach((q, index) => {
    html += `
      <div class="card">
        <div class="question">Q${index+1}: ${q.question}</div>
        
        <div class="options">
          A. ${q.optionA}<br>
          B. ${q.optionB}<br>
          C. ${q.optionC}<br>
          D. ${q.optionD}<br>
          <b>Correct Answer:</b> ${q.correct_ans}
        </div>

        <button onclick="del(${q.q_id})">Delete</button>
      </div>
    `;
  });

  document.getElementById("data").innerHTML = html;
});

function del(id){
  if(confirm("Are you sure you want to delete this question?")){
    fetch("http://localhost:3001/delete/" + id, { method: "DELETE" })
    .then(() => location.reload());
  }
}
</script>

</body>
</html>
