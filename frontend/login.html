<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #90050595, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #667eea;
    }

    button {
      width: 95%;
      padding: 10px;
      background: #667eeab7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      background: #7c2204;
    }

    .link {
      margin-top: 15px;
      display: block;
      color: #667eea;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>🔐 Login</h2>

  <form id="loginForm">
    <input type="email" required placeholder="Enter Email">
    <input type="password" required placeholder="Enter Password">
    <button type="submit">Login</button>
  </form>

  <a href="register.html" class="link">New user? Register here</a>
</div>

<script>
document.getElementById("loginForm").onsubmit = async function(e){
  e.preventDefault();

  const res = await fetch("http://localhost:3001/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email:e.target[0].value,
      password:e.target[1].value
    })
  });

  const data = await res.json();

  if(data.success){
    localStorage.setItem("user", JSON.stringify(data.user));
    window.location="dashboard.html";
  } else {
    alert("Invalid Email or Password");
  }
}
</script>

</body>
</html>
