<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #43e97b, #38f9d7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .register-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
    }

    input:focus {
      border-color: #43e97b;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .submit-btn {
      background: #43e97b;
      color: white;
    }

    .submit-btn:hover {
      background: #2ecc71;
    }

    .reset-btn {
      background: #ddd;
    }

    .reset-btn:hover {
      background: #bbb;
    }

    .link {
      margin-top: 15px;
      display: block;
      color: #43e97b;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="register-box">
  <h2>📝 Register</h2>

  <form id="registerForm">
    <input type="text" id="name" placeholder="Enter Name" required>
    <input type="email" id="email" placeholder="Enter Email" required>
    <input type="password" id="password" placeholder="Password (min 6)" required>
