<!DOCTYPE html>
<html>
<head>
  <title>Aptitude Platform</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;
      color: white;
    }

    .container {
      margin-top: 150px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      margin: 10px;
      font-size: 16px;
      border-radius: 25px;
      text-decoration: none;
      color: white;
      background: #000;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
      transform: scale(1.1);
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
      margin-top: 30px;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🚀 Aptitude & Reasoning Platform</h1>
  <p>Practice smarter, track progress, and improve your skills</p>

  <a href="login.html" class="btn">Login</a>
  <a href="register.html" class="btn">Register</a>

  <div class="card">
    <h3>✨ Features</h3>
    <p>✔ Topic-wise Quiz</p>
    <p>✔ Difficulty Levels</p>
    <p>✔ Progress Tracking</p>
    <p>✔ Admin Panel</p>
  </div>
</div>

</body>
</html>
